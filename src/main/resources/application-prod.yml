# ===== Production Configuration Profile =====
# Active on Render via SPRING_PROFILES_ACTIVE=prod

spring:
  # ===== PostgreSQL (Render-managed) =====
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:docqueue}}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5          # Render free tier has limited connections
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false             # Performance: disable OSIV in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # ===== Redis (Render-managed) =====
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 3000ms
      ssl:
        enabled: ${REDIS_SSL:false}

  # ===== Cache =====
  cache:
    type: redis
    redis:
      time-to-live: 600000          # 10 minutes

  # ===== Email (SMTP) =====
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ===== Security =====
security:
  require-https: true

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# ===== Swagger — disabled in production =====
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ===== Logging =====
logging:
  level:
    com.docqueue: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
